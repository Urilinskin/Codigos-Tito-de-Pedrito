<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Inventario General</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: #0f0f0d; }
  body {
    font-family: 'Syne', sans-serif;
    background: #0f0f0d !important;
    color: #f0ede6 !important;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
  }
  a, p, span, div, h1, h2, h3, button { color: inherit; }

header {
padding: 24px 16px 20px;
border-bottom: 1px solid #2e2e28;
display: flex;
align-items: center;
gap: 14px;
background: #0f0f0d;
}
.logo-mark {
width: 44px; height: 44px;
background: #d4f060;
border-radius: 10px;
display: grid;
place-items: center;
font-size: 22px;
flex-shrink: 0;
}
.header-title h1 {
font-size: 22px;
font-weight: 800;
letter-spacing: -0.5px;
line-height: 1.1;
color: #f0ede6;
}
.header-title h1 span { color: #d4f060; }
.header-title p { font-size: 11px; color: #7a7870; font-family: ‘DM Mono’, monospace; margin-top: 2px; }
.header-meta { margin-left: auto; text-align: right; flex-shrink: 0; }
.header-meta .count { font-size: 28px; font-weight: 800; color: #d4f060; line-height: 1; font-family: ‘DM Mono’, monospace; }
.header-meta .label { font-size: 9px; color: #7a7870; letter-spacing: 1.5px; text-transform: uppercase; }

.search-wrap { padding: 12px 16px; background: #1a1a16; border-bottom: 1px solid #2e2e28; }
.search-inner { position: relative; display: flex; align-items: center; gap: 10px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; color: #f0ede6; }
.search-input {
width: 100%;
padding: 10px 12px 10px 38px;
background: #232320;
border: 1.5px solid #2e2e28;
border-radius: 10px;
color: #f0ede6 !important;
font-family: ‘DM Mono’, monospace;
font-size: 14px;
outline: none;
-webkit-appearance: none;
}
.search-input::placeholder { color: #7a7870; }
.search-input:focus { border-color: #d4f060; }
.result-info { font-size: 11px; color: #7a7870; font-family: ‘DM Mono’, monospace; white-space: nowrap; flex-shrink: 0; }
.result-info span { color: #d4f060; }

.filters-wrap { padding: 12px 16px; border-bottom: 1px solid #2e2e28; background: #0f0f0d; }
.filters-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #7a7870; margin-bottom: 10px; }
.filters { display: flex; flex-wrap: wrap; gap: 7px; }
.filter-btn {
padding: 7px 13px;
border-radius: 100px;
border: 1.5px solid #2e2e28;
background: transparent;
color: #7a7870;
font-family: ‘Syne’, sans-serif;
font-size: 12px;
font-weight: 600;
cursor: pointer;
display: flex;
align-items: center;
gap: 6px;
white-space: nowrap;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
transition: all 0.15s;
}
.filter-btn .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.filter-btn.active {
background: var(–cat-color, #d4f060);
border-color: var(–cat-color, #d4f060);
color: #0f0f0d !important;
}
.filter-btn.active * { color: #0f0f0d !important; }
.filter-btn .badge { background: rgba(0,0,0,0.15); border-radius: 100px; padding: 1px 6px; font-size: 10px; font-family: ‘DM Mono’, monospace; }

.grid-wrap { padding: 14px 16px 60px; background: #0f0f0d; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.card {
background: #1a1a16;
border: 1.5px solid #2e2e28;
border-radius: 14px;
padding: 14px;
position: relative;
overflow: hidden;
display: flex;
flex-direction: column;
gap: 8px;
animation: fadeIn 0.25s ease forwards;
}
.card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 3px;
background: var(–cat-color, #7a7870);
opacity: 0.8;
}
.card-code { font-family: ‘DM Mono’, monospace; font-size: 10px; color: #7a7870; letter-spacing: 1px; }
.card-name { font-size: 13px; font-weight: 700; line-height: 1.3; color: #f0ede6; }
.card-cat {
display: inline-flex;
align-items: center;
gap: 4px;
padding: 3px 8px;
border-radius: 100px;
font-size: 10px;
font-weight: 600;
align-self: flex-start;
color: var(–cat-color, #7a7870);
background: rgba(255,255,255,0.06);
}
.card-cat .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

.empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #7a7870; }
.empty .big { font-size: 40px; margin-bottom: 10px; }

@keyframes fadeIn {
from { opacity: 0; transform: translateY(4px); }
to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

    <div class="result-info"><span id="visibleCount">—</span> productos</div>

<div class="grid-wrap">

const CATS = ["Todos", ...Object.keys(catCounts).sort()];
let activeCat = "Todos", searchVal = "";

const filtersEl = document.getElementById('filters');
CATS.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (cat === 'Todos' ? ' active' : '');
  const color = cat === 'Todos' ? '#d4f060' : (CAT_COLORS[cat] || '#8090a0');
  btn.style.setProperty('--cat-color', color);
  const count = cat === 'Todos' ? ITEMS.length : (catCounts[cat] || 0);
  btn.innerHTML = `<span class="dot" style="background:${color}"></span>${cat}<span class="badge">${count}</span>`;
  btn.addEventListener('click', () => {
    activeCat = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
  filtersEl.appendChild(btn);
});

const grid = document.getElementById('grid');
function render() {
  const q = searchVal.toLowerCase();
  const visible = ITEMS.filter(item => {
    return (activeCat === 'Todos' || item.cat === activeCat) &&
           (!q || item.name.toLowerCase().includes(q) || item.code.includes(q));
  });
  grid.innerHTML = '';
  if (!visible.length) {
    grid.innerHTML = '<div class="empty"><div class="big">🔍</div><p>No se encontraron productos</p></div>';
  } else {
    visible.forEach((item, i) => {
      const color = CAT_COLORS[item.cat] || '#8090a0';
      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--cat-color', color);
      card.style.animationDelay = Math.min(i * 0.02, 0.3) + 's';
      card.style.opacity = '0';
      card.innerHTML = `<div class="card-code">#${item.code}</div><div class="card-name">${item.name}</div><div class="card-cat"><span class="dot"></span>${item.cat}</div>`;
      grid.appendChild(card);
    });
  }
  document.getElementById('visibleCount').textContent = visible.length;
}

document.getElementById('totalCount').textContent = ITEMS.length;
document.getElementById('search').addEventListener('input', e => { searchVal = e.target.value; render(); });
render();
